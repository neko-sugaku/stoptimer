<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピタッとストップ 〜目指せ体内時計マスター！〜</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap');
    
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      user-select: none;
      margin: 0;
      overflow: hidden;
    }
    
    .pop-in {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    
    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .delay-100 { animation-delay: 0.3s; }
    .delay-200 { animation-delay: 0.6s; }
    
    .heartbeat {
      animation: heartbeat 2s ease-in-out infinite both;
    }
    
    @keyframes heartbeat {
      from { transform: scale(1); }
      10% { transform: scale(1.02); }
      17% { transform: scale(0.98); }
      33% { transform: scale(1.02); }
      45% { transform: scale(1); }
    }

    .bg-stripes {
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.4),
        rgba(255, 255, 255, 0.4) 20px,
        transparent 20px,
        transparent 40px
      );
    }
  </style>
</head>
<body class="w-screen h-screen bg-amber-50 overflow-hidden text-slate-800 relative">

  <!-- ================= メニュー画面 ================= -->
  <div id="screen-menu" class="absolute inset-0 flex flex-col items-center justify-center p-4">
    <h1 class="text-5xl md:text-7xl font-black mb-10 text-amber-600 drop-shadow-md text-center leading-tight">
      ピタッとストップ<br />
      <span class="text-3xl md:text-5xl text-amber-500">〜 目指せ体内時計マスター！ 〜</span>
    </h1>
    
    <div class="flex flex-col gap-6 w-full max-w-2xl">
      <button id="btn-mode-0" class="menu-btn p-6 md:p-8 rounded-3xl text-3xl md:text-5xl font-bold transition-all duration-200 border-8 bg-white text-orange-500 border-orange-200 hover:bg-orange-50" data-mode="0">
        ① 10秒チャレンジ
      </button>
      
      <button id="btn-mode-1" class="menu-btn p-6 md:p-8 rounded-3xl text-3xl md:text-5xl font-bold transition-all duration-200 border-8 bg-white text-blue-500 border-blue-200 hover:bg-blue-50" data-mode="1">
        ② ランダム時間チャレンジ
      </button>

      <button id="btn-mode-2" class="menu-btn p-6 md:p-8 rounded-3xl text-3xl md:text-5xl font-bold transition-all duration-200 border-8 bg-white text-green-500 border-green-200 hover:bg-green-50" data-mode="2">
        🏆 ランキングをみる
      </button>
    </div>

    <div class="mt-12 text-2xl md:text-3xl text-gray-700 font-bold bg-white/70 px-8 py-5 rounded-full shadow-sm text-center">
      キーボードの <span class="text-amber-600">[↑] [↓]</span> でえらんで <span class="text-amber-600">[Enter]</span> で決定！<br />
      画面をタップしてもあそべるよ！
    </div>
  </div>

  <!-- ================= カウントダウン画面 ================= -->
  <div id="screen-countdown" class="absolute inset-0 hidden flex flex-col items-center justify-center">
    <div id="countdown-text" class="text-[12rem] md:text-[20rem] font-black text-amber-500 drop-shadow-2xl">
      3
    </div>
  </div>

  <!-- ================= プレイ（計測中）画面 ================= -->
  <div id="screen-playing" class="absolute inset-0 hidden flex flex-col items-center justify-center cursor-pointer heartbeat bg-stripes">
    <!-- スタート表示用オーバーレイ -->
    <div id="start-overlay" class="absolute inset-0 hidden items-center justify-center bg-green-500/20 z-50">
      <div id="start-text" class="text-8xl md:text-[12rem] font-black text-green-600 drop-shadow-2xl">
        スタート！
      </div>
    </div>

    <div class="z-10 flex flex-col items-center pointer-events-none">
      <div class="text-5xl md:text-7xl font-black text-gray-800 mb-12 text-center leading-normal bg-white/60 p-8 rounded-3xl shadow-lg">
        <span id="playing-target-time" class="text-red-600 text-8xl md:text-[12rem] mx-2 drop-shadow-md">10</span>
        秒で<br />止めてください！
      </div>
      
      <div class="text-4xl md:text-6xl font-bold text-blue-600 animate-pulse bg-white/90 px-12 py-8 rounded-full shadow-xl border-4 border-blue-200 text-center">
        画面タップ または<br />エンターキー！
      </div>
    </div>
  </div>

  <!-- ================= 結果画面 ================= -->
  <div id="screen-result" class="absolute inset-0 hidden flex flex-col items-center justify-center cursor-pointer p-4 bg-white/90">
    <div class="text-3xl md:text-5xl font-bold text-gray-500 mb-6 bg-gray-100 px-6 py-3 rounded-full">
      目標：<span id="result-target-time">10</span>秒
    </div>
    
    <div id="result-record" class="text-6xl md:text-8xl font-black text-gray-800 mb-8 drop-shadow-lg text-center pop-in">
      記録: <span id="result-time-val" class="text-7xl md:text-[10rem] text-orange-500">10.000</span> 秒！
    </div>

    <div id="result-diff-box" class="text-5xl md:text-7xl font-black mb-8 pop-in delay-100 bg-gray-50 px-10 py-6 rounded-3xl shadow-inner border-4 border-gray-200 text-center">
      誤差 <span id="result-diff-sign">±</span> <span id="result-diff-val">0.000</span> 秒 <br/>
      <span id="result-diff-label" class="text-4xl md:text-5xl opacity-80">(ぴったり！！)</span>
    </div>

    <div id="result-evaluation" class="text-6xl md:text-7xl font-black text-amber-500 mb-12 pop-in delay-200 animate-bounce drop-shadow-md">
      ✨ 神業！！ ✨
    </div>

    <div class="text-2xl md:text-4xl font-bold text-gray-600 animate-pulse bg-amber-100 px-10 py-5 rounded-full border-4 border-amber-300 pointer-events-none">
      タップ または エンター でメニューへ
    </div>
  </div>

  <!-- ================= ランキング画面 ================= -->
  <div id="screen-ranking" class="absolute inset-0 hidden flex flex-col items-center p-4 bg-amber-50 overflow-y-auto">
    <h2 class="text-4xl md:text-6xl font-black mt-4 mb-8 text-amber-600 drop-shadow-md text-center">
      🏆 ランキング 🏆
    </h2>
    
    <div class="flex flex-col lg:flex-row gap-6 w-full max-w-7xl pb-8">
      <!-- 10秒チャレンジ ランキング -->
      <div class="flex-1 bg-white rounded-3xl p-6 shadow-xl border-4 border-orange-200">
        <h3 class="text-3xl md:text-4xl font-bold text-center text-orange-500 mb-6 border-b-4 border-orange-100 pb-2">
          ① 10秒チャレンジ
        </h3>
        <div id="ranking-list-10" class="flex flex-col gap-3">
          <!-- JSで生成 -->
        </div>
      </div>

      <!-- ランダム時間チャレンジ ランキング -->
      <div class="flex-1 bg-white rounded-3xl p-6 shadow-xl border-4 border-blue-200">
        <h3 class="text-3xl md:text-4xl font-bold text-center text-blue-500 mb-6 border-b-4 border-blue-100 pb-2">
          ② ランダム時間
        </h3>
        <div id="ranking-list-random" class="flex flex-col gap-3">
          <!-- JSで生成 -->
        </div>
      </div>
    </div>

    <button id="btn-ranking-back" class="mt-4 p-4 md:p-6 rounded-full text-2xl md:text-4xl font-bold bg-gray-600 text-white hover:bg-gray-700 transition-all shadow-lg border-4 border-gray-800 mb-8 cursor-pointer z-10">
      メニューにもどる
    </button>
  </div>

  <!-- ================= JavaScript ================= -->
  <script>
    // --- 状態管理 ---
    let gameState = 'menu'; // 'menu', 'countdown', 'playing', 'result', 'ranking'
    let selectedMode = 0;   // 0: 10秒, 1: ランダム, 2: ランキング
    let targetTime = 10;
    let countdownValue = 3;
    let startTime = 0;
    let resultTime = 0;
    let countdownTimerId = null;

    // ランキングデータ
    let rankings = { mode10: [], modeRandom: [] };

    // --- DOM要素取得 ---
    const screens = {
      menu: document.getElementById('screen-menu'),
      countdown: document.getElementById('screen-countdown'),
      playing: document.getElementById('screen-playing'),
      result: document.getElementById('screen-result'),
      ranking: document.getElementById('screen-ranking')
    };

    const btnMode0 = document.getElementById('btn-mode-0');
    const btnMode1 = document.getElementById('btn-mode-1');
    const btnMode2 = document.getElementById('btn-mode-2');
    const menuBtns = [btnMode0, btnMode1, btnMode2];

    // --- 画面切り替え関数 ---
    function showScreen(screenName) {
      Object.keys(screens).forEach(key => {
        if (key === screenName) {
          screens[key].classList.remove('hidden');
          if(key !== 'menu') screens[key].classList.add('flex'); // hiddenを外してflexを当てる
        } else {
          screens[key].classList.add('hidden');
          screens[key].classList.remove('flex');
        }
      });
      gameState = screenName;
    }

    // --- メニューUI更新 ---
    function updateMenuUI() {
      menuBtns.forEach((btn, index) => {
        // 基本クラスにリセット
        btn.className = 'menu-btn p-6 md:p-8 rounded-3xl text-3xl md:text-5xl font-bold transition-all duration-200 border-8 cursor-pointer';
        
        if (index === 0) { // 10秒
          if (selectedMode === 0) btn.classList.add('bg-orange-400', 'text-white', 'border-orange-600', 'scale-105', 'shadow-2xl');
          else btn.classList.add('bg-white', 'text-orange-500', 'border-orange-200', 'hover:bg-orange-50');
        } else if (index === 1) { // ランダム
          if (selectedMode === 1) btn.classList.add('bg-blue-400', 'text-white', 'border-blue-600', 'scale-105', 'shadow-2xl');
          else btn.classList.add('bg-white', 'text-blue-500', 'border-blue-200', 'hover:bg-blue-50');
        } else if (index === 2) { // ランキング
          if (selectedMode === 2) btn.classList.add('bg-green-400', 'text-white', 'border-green-600', 'scale-105', 'shadow-2xl');
          else btn.classList.add('bg-white', 'text-green-500', 'border-green-200', 'hover:bg-green-50');
        }
      });
    }

    // メニューのボタンイベント
    menuBtns.forEach((btn, index) => {
      btn.addEventListener('mouseenter', () => {
        if (gameState === 'menu') {
          selectedMode = index;
          updateMenuUI();
        }
      });
      btn.addEventListener('click', () => {
        if (index === 2) {
          renderRanking();
          showScreen('ranking');
        } else {
          startGame(index);
        }
      });
    });

    // --- ゲーム進行処理 ---
    function startGame(mode) {
      if (mode === 0) {
        targetTime = 10;
      } else {
        targetTime = Math.floor(Math.random() * 16) + 5; // 5〜20
      }
      selectedMode = mode;
      countdownValue = 3;
      document.getElementById('playing-target-time').innerText = targetTime;
      
      startCountdown();
    }

    function startCountdown() {
      showScreen('countdown');
      updateCountdownUI();

      countdownTimerId = setInterval(() => {
        countdownValue--;
        if (countdownValue > 0) {
          updateCountdownUI();
        } else {
          clearInterval(countdownTimerId);
          startPlaying();
        }
      }, 1000);
    }

    function updateCountdownUI() {
      const el = document.getElementById('countdown-text');
      el.innerText = countdownValue;
      // アニメーションを再トリガーするためのリセット処理
      el.classList.remove('pop-in');
      void el.offsetWidth; // 強制リフロー
      el.classList.add('pop-in');
    }

    function startPlaying() {
      showScreen('playing');
      startTime = Date.now();

      // 「スタート！」の表示処理
      const overlay = document.getElementById('start-overlay');
      const text = document.getElementById('start-text');
      overlay.classList.remove('hidden');
      overlay.classList.add('flex');
      text.classList.remove('pop-in');
      void text.offsetWidth;
      text.classList.add('pop-in');

      setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
      }, 1000);
    }

    function stopTimer() {
      if (gameState !== 'playing') return;
      const end = Date.now();
      resultTime = (end - startTime) / 1000;
      const diff = resultTime - targetTime;
      const absDiff = Math.abs(diff);

      // ランキング記録
      const newRecord = { target: targetTime, result: resultTime, diff: diff, absDiff: absDiff };
      if (selectedMode === 0) {
        rankings.mode10.push(newRecord);
        rankings.mode10.sort((a, b) => a.absDiff - b.absDiff);
        if (rankings.mode10.length > 10) rankings.mode10.length = 10;
      } else {
        rankings.modeRandom.push(newRecord);
        rankings.modeRandom.sort((a, b) => a.absDiff - b.absDiff);
        if (rankings.modeRandom.length > 10) rankings.modeRandom.length = 10;
      }

      showResultUI(diff, absDiff);
      showScreen('result');
    }

    function showResultUI(diff, absDiff) {
      document.getElementById('result-target-time').innerText = targetTime;
      document.getElementById('result-time-val').innerText = resultTime.toFixed(3);

      let diffSign = '';
      let diffColorClass = '';
      let diffLabel = '';

      if (diff > 0.005) {
        diffSign = '＋'; diffColorClass = 'text-red-600'; diffLabel = 'おそい';
      } else if (diff < -0.005) {
        diffSign = 'ー'; diffColorClass = 'text-blue-600'; diffLabel = 'はやい';
      } else {
        diffSign = '±'; diffColorClass = 'text-green-500'; diffLabel = 'ぴったり！！';
      }

      document.getElementById('result-diff-sign').innerText = diffSign;
      document.getElementById('result-diff-val').innerText = absDiff.toFixed(3);
      document.getElementById('result-diff-label').innerText = `(${diffLabel})`;

      const diffBox = document.getElementById('result-diff-box');
      diffBox.className = `text-5xl md:text-7xl font-black ${diffColorClass} mb-8 pop-in delay-100 bg-gray-50 px-10 py-6 rounded-3xl shadow-inner border-4 border-gray-200 text-center`;

      let evaluation = '';
      if (absDiff < 0.1) evaluation = '✨ 神業！！ ✨';
      else if (absDiff < 0.5) evaluation = '🌟 すばらしい！ 🌟';
      else if (absDiff < 1.0) evaluation = '👍 いいかんじ！ 👍';
      else evaluation = '💪 もうすこし！ 💪';

      document.getElementById('result-evaluation').innerText = evaluation;

      // 結果画面のアニメーション再トリガー
      ['result-record', 'result-diff-box', 'result-evaluation'].forEach(id => {
        const el = document.getElementById(id);
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = null;
      });
    }

    // --- ランキング描画 ---
    function renderRanking() {
      const getDiffText = (diff) => {
        if (Math.abs(diff) <= 0.005) return "± 0.000";
        return diff > 0 ? `＋ ${diff.toFixed(3)}` : `ー ${Math.abs(diff).toFixed(3)}`;
      };

      const list10 = document.getElementById('ranking-list-10');
      const listRandom = document.getElementById('ranking-list-random');

      // 10秒
      if (rankings.mode10.length === 0) {
        list10.innerHTML = '<p class="text-2xl text-center text-gray-400 py-10 font-bold">まだ きろく がないよ</p>';
      } else {
        list10.innerHTML = rankings.mode10.map((record, index) => `
          <div class="flex flex-col xl:flex-row xl:items-center justify-between text-2xl md:text-3xl font-bold bg-orange-50 p-3 rounded-xl gap-2 xl:gap-0">
            <div class="flex items-center gap-4">
              <span class="w-12 text-center ${index < 3 ? 'text-orange-500 text-4xl' : 'text-gray-500'}">${index + 1}位</span>
              <span class="text-gray-800">${record.result.toFixed(3)}秒</span>
            </div>
            <span class="text-xl md:text-2xl text-gray-500">(誤差 ${getDiffText(record.diff)}秒)</span>
          </div>
        `).join('');
      }

      // ランダム
      if (rankings.modeRandom.length === 0) {
        listRandom.innerHTML = '<p class="text-2xl text-center text-gray-400 py-10 font-bold">まだ きろく がないよ</p>';
      } else {
        listRandom.innerHTML = rankings.modeRandom.map((record, index) => `
          <div class="flex flex-col 2xl:flex-row 2xl:items-center justify-between text-xl md:text-2xl font-bold bg-blue-50 p-3 rounded-xl gap-2 2xl:gap-0">
            <div class="flex items-center gap-2 md:gap-4">
              <span class="w-10 text-center ${index < 3 ? 'text-blue-500 text-3xl md:text-4xl' : 'text-gray-500 text-2xl md:text-3xl'}">${index + 1}位</span>
              <span class="text-gray-600 bg-white px-2 py-1 rounded-md text-lg md:text-xl">目標${record.target}秒</span>
              <span class="text-gray-800 text-2xl md:text-3xl">${record.result.toFixed(3)}秒</span>
            </div>
            <span class="text-lg md:text-xl text-gray-500">(誤差 ${getDiffText(record.diff)}秒)</span>
          </div>
        `).join('');
      }
    }

    // --- イベントリスナー ---
    
    // キーボード操作
    window.addEventListener('keydown', (e) => {
      if ([' ', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
        e.preventDefault();
      }

      if (gameState === 'menu') {
        if (e.key === 'ArrowUp') {
          selectedMode = selectedMode > 0 ? selectedMode - 1 : 2;
          updateMenuUI();
        } else if (e.key === 'ArrowDown') {
          selectedMode = selectedMode < 2 ? selectedMode + 1 : 0;
          updateMenuUI();
        } else if (e.key === 'Enter' || e.key === ' ') {
          if (selectedMode === 2) {
            renderRanking();
            showScreen('ranking');
          } else {
            startGame(selectedMode);
          }
        }
      } else if (gameState === 'playing') {
        if (e.key === 'Enter' || e.key === ' ') {
          stopTimer();
        }
      } else if (gameState === 'result') {
        if (e.key === 'Enter' || e.key === ' ') {
          showScreen('menu');
        }
      } else if (gameState === 'ranking') {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape') {
          selectedMode = 0;
          updateMenuUI();
          showScreen('menu');
        }
      }
    });

    // タップ（クリック）操作
    screens.playing.addEventListener('click', stopTimer);
    
    screens.result.addEventListener('click', () => {
      if (gameState === 'result') showScreen('menu');
    });

    document.getElementById('btn-ranking-back').addEventListener('click', () => {
      selectedMode = 0;
      updateMenuUI();
      showScreen('menu');
    });

    // 初期化
    updateMenuUI();

  </script>
</body>
</html>
